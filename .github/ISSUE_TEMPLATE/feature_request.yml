name: Feature Request
description: Suggest an improvement
title: "[Feature]: "
labels: ["enhancement", "needs-design"]
assignees:
  - OptimumAF
body:
  - type: markdown
    attributes:
      value: |
        Thanks for the suggestion. Please focus on the problem and expected user value.
  - type: textarea
    id: problem
    attributes:
      label: Problem Statement
      placeholder: What user problem are you trying to solve?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed Solution
      placeholder: Describe the proposed behavior or implementation.
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives Considered
      placeholder: What alternatives did you consider?
  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - Web app
        - Desktop app
        - Data pipeline
        - CI/CD
        - Documentation
        - Other
    validations:
      required: true
  - type: dropdown
    id: milestone
    attributes:
      label: Suggested Milestone
      description: Select the roadmap milestone this best aligns to.
      options:
        - M1 Core UX Hardening
        - M2 Discovery and Integrations
        - M3 Accounts and Sync
        - M4 Release and Trust
        - Not sure
    validations:
      required: true
  - type: dropdown
    id: effort
    attributes:
      label: Rough Effort
      options:
        - Small (1-2 PRs)
        - Medium (multi-file feature)
        - Large (cross-app/project-wide)
        - Unknown
