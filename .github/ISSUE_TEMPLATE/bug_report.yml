name: Bug Report
description: Report a reproducible problem
title: "[Bug]: "
labels: ["bug"]
assignees:
  - OptimumAF
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting a bug. Please provide enough detail to reproduce it quickly.
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What happened?
      placeholder: Clear and concise bug summary.
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to Reproduce
      placeholder: |
        1. Go to ...
        2. Click ...
        3. See error ...
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
      placeholder: What should have happened?
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual Behavior
      placeholder: What happened instead?
    validations:
      required: true
  - type: input
    id: environment
    attributes:
      label: Environment
      description: OS/browser/runtime versions
      placeholder: "Windows 11, Chrome 133, Node 22, Rust 1.86"
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Logs and Screenshots
      description: Paste errors and/or add screenshots.
      render: shell

