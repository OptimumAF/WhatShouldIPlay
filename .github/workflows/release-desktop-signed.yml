name: Release Signed Desktop (Windows)

on:
  workflow_dispatch:
    inputs:
      tag:
        description: "Version tag to sign and publish (for example: v1.2.5)"
        required: true
        type: string

permissions:
  contents: write
  attestations: write
  id-token: write

jobs:
  release-signed-windows:
    runs-on: windows-latest
    env:
      WINDOWS_CERT_BASE64: ${{ secrets.WINDOWS_CERT_BASE64 }}
      WINDOWS_CERT_PASSWORD: ${{ secrets.WINDOWS_CERT_PASSWORD }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          ref: refs/tags/${{ github.event.inputs.tag }}

      - name: Validate tag format
        shell: pwsh
        run: |
          $tag = "${{ github.event.inputs.tag }}"
          if (-not $tag.StartsWith("v")) {
            throw "Tag must start with 'v'. Received: $tag"
          }

      - name: Validate signing secrets
        shell: pwsh
        run: |
          if ([string]::IsNullOrWhiteSpace($env:WINDOWS_CERT_BASE64) -or [string]::IsNullOrWhiteSpace($env:WINDOWS_CERT_PASSWORD)) {
            Write-Error "Production code-signing secrets are required for signed release tags."
            exit 1
          }

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Cargo
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: apps/desktop

      - name: Build release binary
        run: cargo build --release
        working-directory: apps/desktop

      - name: Sign executable
        shell: pwsh
        run: |
          $exe = Get-ChildItem apps/desktop/target/release/*.exe | Select-Object -First 1
          if (-not $exe) { throw "No executable found to sign." }
          $signtool = (Get-Command signtool.exe -ErrorAction SilentlyContinue).Source
          if (-not $signtool) {
            $signtool = Get-ChildItem "C:\Program Files (x86)\Windows Kits\10\bin\*\x64\signtool.exe" -ErrorAction SilentlyContinue |
              Sort-Object FullName -Descending |
              Select-Object -First 1 -ExpandProperty FullName
          }
          if (-not $signtool) { throw "signtool.exe not found on runner." }
          $certPath = Join-Path $env:RUNNER_TEMP "codesign.pfx"
          [IO.File]::WriteAllBytes($certPath, [Convert]::FromBase64String($env:WINDOWS_CERT_BASE64))
          $timestampAuthorities = @(
            "http://timestamp.digicert.com",
            "http://timestamp.sectigo.com"
          )
          $signed = $false
          foreach ($timestamp in $timestampAuthorities) {
            & $signtool sign /fd SHA256 /f $certPath /p $env:WINDOWS_CERT_PASSWORD /tr $timestamp /td SHA256 $exe.FullName
            if ($LASTEXITCODE -eq 0) {
              $signed = $true
              break
            }
            Write-Warning "Signing attempt failed with timestamp server '$timestamp' (exit $LASTEXITCODE)."
          }
          if (-not $signed) { throw "Failed to sign executable with available timestamp servers." }

      - name: Generate checksums
        shell: pwsh
        run: |
          $out = "apps/desktop/target/release/SHA256SUMS.txt"
          $lines = Get-ChildItem apps/desktop/target/release/*.exe | ForEach-Object {
            $hash = (Get-FileHash $_.FullName -Algorithm SHA256).Hash.ToLower()
            "$hash *$($_.Name)"
          }
          $lines | Set-Content -Path $out -Encoding ascii

      - name: Attest signed release artifacts
        uses: actions/attest-build-provenance@v4
        with:
          subject-path: |
            apps/desktop/target/release/*.exe
            apps/desktop/target/release/SHA256SUMS.txt

      - name: Publish signed release artifacts
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ github.event.inputs.tag }}
          files: |
            apps/desktop/target/release/*.exe
            apps/desktop/target/release/SHA256SUMS.txt

