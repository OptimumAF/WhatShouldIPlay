name: Web CI

on:
  push:
    branches:
      - master
  pull_request:
    branches:
      - master

permissions:
  contents: read

jobs:
  web-checks:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Build
        run: npm run build

      - name: Lighthouse Accessibility Gate
        run: npx -y @lhci/cli@0.15.1 autorun --config=./lighthouserc.json

      - name: Axe Accessibility Gate
        run: |
          npm run preview -- --host 127.0.0.1 --port 4173 > preview.log 2>&1 &
          PREVIEW_PID=$!
          trap 'kill $PREVIEW_PID' EXIT

          for i in {1..45}; do
            if curl -fsS http://127.0.0.1:4173 > /dev/null; then
              break
            fi
            sleep 1
          done

          npx -y @axe-core/cli@4.10.2 http://127.0.0.1:4173 --exit


