name: Web CI

on:
  push:
    branches:
      - master
  pull_request:
    branches:
      - master

permissions:
  contents: read

jobs:
  web-checks:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Build
        run: npm run build

      - name: Install Playwright (Chromium)
        run: npx playwright install --with-deps chromium

      - name: Playwright E2E (Chromium)
        run: npm run test:e2e:ci

      - name: Lighthouse Accessibility Gate
        run: npx -y @lhci/cli@0.15.1 autorun --config=./lighthouserc.json

      - name: Axe Accessibility Gate
        run: |
          npm run preview -- --host 127.0.0.1 --port 4173 > preview.log 2>&1 &
          PREVIEW_PID=$!
          trap 'kill $PREVIEW_PID' EXIT

          for i in {1..45}; do
            if curl -fsS http://127.0.0.1:4173 > /dev/null; then
              break
            fi
            sleep 1
          done

          if ! curl -fsS http://127.0.0.1:4173 > /dev/null; then
            cat preview.log
            exit 1
          fi

          npx -y browser-driver-manager install chrome

          if [ -f "$HOME/.browser-driver-manager/.env" ]; then
            set -a
            . "$HOME/.browser-driver-manager/.env"
            set +a
          fi

          if [ -n "${CHROMEDRIVER_TEST_PATH:-}" ]; then
            case "$CHROMEDRIVER_TEST_PATH" in
              /*) ;;
              *) CHROMEDRIVER_TEST_PATH="$HOME/$CHROMEDRIVER_TEST_PATH" ;;
            esac
            export PATH="$(dirname "$CHROMEDRIVER_TEST_PATH"):$PATH"
          fi

          if [ -n "${CHROME_TEST_PATH:-}" ]; then
            case "$CHROME_TEST_PATH" in
              /*) ;;
              *) CHROME_TEST_PATH="$HOME/$CHROME_TEST_PATH" ;;
            esac
            export CHROME_BIN="$CHROME_TEST_PATH"
          fi

          npx -y @axe-core/cli@4.10.2 http://127.0.0.1:4173 --chromedriver-path "$CHROMEDRIVER_TEST_PATH" --exit


