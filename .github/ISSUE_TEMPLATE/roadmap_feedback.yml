name: Roadmap Feedback
description: Prioritization feedback for upcoming roadmap work
title: "[Roadmap]: "
labels: ["feedback", "roadmap"]
assignees:
  - OptimumAF
body:
  - type: markdown
    attributes:
      value: |
        Use this template to help prioritize roadmap work. Keep feedback concrete and user-impact focused.
  - type: dropdown
    id: release_window
    attributes:
      label: Priority Window
      description: When should this be addressed?
      options:
        - Next release
        - This quarter
        - Future milestone
    validations:
      required: true
  - type: checkboxes
    id: scope
    attributes:
      label: Impacted Areas
      options:
        - label: Web app
        - label: Desktop app
        - label: Data pipeline
        - label: CI/CD and release quality
        - label: Documentation and onboarding
    validations:
      required: true
  - type: textarea
    id: request
    attributes:
      label: Request
      description: What should change?
      placeholder: Describe the capability or quality change.
    validations:
      required: true
  - type: textarea
    id: user_value
    attributes:
      label: User Value
      description: Why does this matter for users?
      placeholder: Explain expected benefit, risk reduction, or time saved.
    validations:
      required: true
  - type: dropdown
    id: tradeoff
    attributes:
      label: Tradeoff Tolerance
      options:
        - High quality over speed
        - Balanced
        - Fast iteration over polish
    validations:
      required: true
  - type: textarea
    id: references
    attributes:
      label: References
      description: Link related issues, discussions, or examples.
      placeholder: https://github.com/OptimumAF/WhatShouldIPlay/issues/123
