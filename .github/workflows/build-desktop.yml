name: Build Desktop App

on:
  workflow_dispatch:
  push:
    branches:
      - master
  pull_request:
    branches:
      - master

permissions:
  contents: read

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Cargo
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: apps/desktop

      - name: Build
        run: cargo build --release
        working-directory: apps/desktop

      - name: Sign executable (optional)
        if: ${{ secrets.WINDOWS_CERT_BASE64 != '' && secrets.WINDOWS_CERT_PASSWORD != '' }}
        shell: pwsh
        run: |
          $exe = Get-ChildItem apps/desktop/target/release/*.exe | Select-Object -First 1
          if (-not $exe) { throw "No executable found to sign." }
          $signtool = (Get-Command signtool.exe -ErrorAction SilentlyContinue).Source
          if (-not $signtool) { throw "signtool.exe not found on runner." }
          $certPath = Join-Path $env:RUNNER_TEMP "codesign.pfx"
          [IO.File]::WriteAllBytes($certPath, [Convert]::FromBase64String("${{ secrets.WINDOWS_CERT_BASE64 }}"))
          & $signtool sign /fd SHA256 /f $certPath /p "${{ secrets.WINDOWS_CERT_PASSWORD }}" /tr http://timestamp.digicert.com /td SHA256 $exe.FullName

      - name: Generate checksums
        shell: pwsh
        run: |
          $out = "apps/desktop/target/release/SHA256SUMS.txt"
          $lines = Get-ChildItem apps/desktop/target/release/*.exe | ForEach-Object {
            $hash = (Get-FileHash $_.FullName -Algorithm SHA256).Hash.ToLower()
            "$hash *$($_.Name)"
          }
          $lines | Set-Content -Path $out -Encoding ascii

      - name: Upload executable + checksums
        uses: actions/upload-artifact@v4
        with:
          name: pick-a-game-desktop-windows-${{ github.run_number }}
          path: |
            apps/desktop/target/release/*.exe
            apps/desktop/target/release/SHA256SUMS.txt
